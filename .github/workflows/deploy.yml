name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build board app
        run: pnpm --filter @erudis/board build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://djodkjysovalpufgevrr.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqb2Rranlzb3ZhbHB1ZmdldnJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNTIwNTAsImV4cCI6MjA4NTcyODA1MH0._nUF3GtZLogIGRJqs4V9Eze0CArIz3dP15n-Y-N6rps' }}

      - name: Build player app
        run: pnpm --filter @erudis/player build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://djodkjysovalpufgevrr.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqb2Rranlzb3ZhbHB1ZmdldnJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNTIwNTAsImV4cCI6MjA4NTcyODA1MH0._nUF3GtZLogIGRJqs4V9Eze0CArIz3dP15n-Y-N6rps' }}

      - name: Combine builds
        run: |
          mkdir -p _site
          cp -r apps/board/dist/* _site/
          mkdir -p _site/player
          cp -r apps/player/dist/* _site/player/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
